name: Build & Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Login to Docker Hub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 3. Build & Push Image
      - name: Build and Push to branchprotectiondocker repo
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/branchprotectiondocker:${{ github.sha }} ./front-end
          docker tag ${{ secrets.DOCKER_USERNAME }}/branchprotectiondocker:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/branchprotectiondocker:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/branchprotectiondocker:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/branchprotectiondocker:latest

name: Build & Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
# Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

# Docker login
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

# # Backend build & push
#       - name: Build Backend
#         run:|
#           docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }} ./backend
#           docker push ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }}

# Frontend build & push
      - name: Build Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/branchprotectiondocker:${{ github.sha }} ../../frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/branchprotectiondocker:${{ github.sha }}
